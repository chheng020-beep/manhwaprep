name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt
          pip install pyinstaller
          # Install playwright package so PyInstaller can bundle it.
          # Chromium itself is NOT installed here — it downloads on first use
          # on the end-user's machine via _ensure_chromium() in headless.py.
          python -m playwright install-deps

      - name: Build .exe
        run: pyinstaller manhwaprep.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManhwaPrep-windows
          path: dist/ManhwaPrep.exe
          if-no-files-found: error
